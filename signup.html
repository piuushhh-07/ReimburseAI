{% extends "base.html" %}
{% block title %}Signup{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2>Create Company Account</h2>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username (Admin)</label>
                <input class="form-control" name="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input class="form-control" type="password" name="password" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Country (for currency)</label>
                <input class="form-control" name="country" placeholder="India, USA, etc." required>
            </div>
            <button class="btn btn-success w-100">Create Company & Admin</button>
        </form>
    </div>
</div>
{% endblock %}
